\* MCMCPEnv.cfg -- TLC configuration for QGSDMCPEnv.tla
\* MCPENV-02: Machine-checkable MCP environment model configuration.
\*
\* NumSlots = 2: Keeps state space tractable (3^2 * 2^2 = 36 combinations per round).
\* Symmetry reduction via constant bound rather than SYMMETRY declaration to avoid
\* operator compatibility requirements. See formal/spec/mcp-calls/environment.md Section 5.
SPECIFICATION Spec
CONSTANTS
  NumSlots = 2
  MaxRetries = 2
  QuorumThreshold = 1
INVARIANT NoSpuriousConsensus
INVARIANT TypeInvariantHolds
PROPERTY EventualDecision
CHECK_DEADLOCK TRUE
