\* formal/tla/MCprefilter.cfg
\* TLC model for QGSDPreFilter.tla — R4 pre-filter protocol auto-resolution soundness.
\* Checks safety invariants AutoResolutionSound/FilterRoundsBounded/AutoResolvedPhaseConsistent
\* + liveness PreFilterTerminates.
\*
\* Run: node bin/run-protocol-tlc.cjs MCprefilter  (requires Java >=17 + tla2tools.jar)
\* Note: -workers 1 required for liveness check (avoids TLC multi-worker liveness bug).
SPECIFICATION Spec
CONSTANTS
    MaxFilterRounds = 3
INVARIANT TypeOK
INVARIANT AutoResolutionSound
INVARIANT FilterRoundsBounded
INVARIANT AutoResolvedPhaseConsistent
PROPERTY PreFilterTerminates
CHECK_DEADLOCK FALSE
