\* formal/tla/MCSessionPersistence.cfg
\* TLC model for QGSDSessionPersistence.tla — TUI session persistence across restarts.
\*
\* Run: java -cp tla2tools.jar tlc2.TLC -config MCSessionPersistence.cfg QGSDSessionPersistence -workers 1
\*
\* IMPORTANT: Do NOT add a FAIRNESS line here. Fairness is declared via WF_vars()
\* inside the Spec formula in QGSDSessionPersistence.tla.
SPECIFICATION Spec
CONSTANTS
    MaxSessions = 3
    MaxRestarts = 2
INVARIANT TypeOK
INVARIANT PersistenceIntegrity
INVARIANT CounterRestored
INVARIANT CounterBounded
PROPERTY RestoreComplete_Prop
CHECK_DEADLOCK FALSE
