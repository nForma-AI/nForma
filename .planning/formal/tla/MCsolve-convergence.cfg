\* formal/tla/MCsolve-convergence.cfg
\* TLC model for NFSolveConvergence.tla -- outer solve loop convergence.
\* Safety: OscillationBounded (no layer oscillates more than once).
\* Liveness: EventualConvergence (solve loop eventually converges).
\*
\* Run: node bin/run-oscillation-tlc.cjs MCsolve-convergence  (requires Java >=17 + tla2tools.jar)
\* Note: -workers 1 required for liveness check (avoids TLC multi-worker liveness bug).
SPECIFICATION Spec
CONSTANTS
    L1 = L1
    L2 = L2
    L3 = L3
    Layers = {L1, L2, L3}
    DownstreamOf = (L1 :> {} @@ L2 :> {L1} @@ L3 :> {L2})
    MaxSessions = 5
    MaxResidual = 3
INVARIANT TypeOK
INVARIANT OscillationBounded
PROPERTY EventualConvergence
CHECK_DEADLOCK FALSE
