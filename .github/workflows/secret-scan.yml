name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog (history scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@v3.93.6
        with:
          extra_args: --only-verified --results=verified,unknown

  gitleaks-ci:
    name: Gitleaks (backup scan)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_8.30.0_linux_x64.tar.gz | tar xz
          chmod +x gitleaks

      - name: Gitleaks scan
        run: ./gitleaks detect --source . --config .gitleaks.toml --redact --verbose

  detect-secrets-ci:
    name: detect-secrets (baseline check)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: Check baseline
        run: |
          # Re-scan and compare to committed baseline
          detect-secrets scan \
            --baseline .secrets.baseline \
            --exclude-files 'node_modules/.*' \
            --exclude-files '\.planning/.*\.jsonl' \
            --exclude-files 'bin/secrets\.test\.cjs' \
            --exclude-files 'bin/ccr-secure-config\.test\.cjs' \
            --exclude-files 'bin/set-secret\.test\.cjs' \
            --exclude-files '\.secrets\.baseline'
          # Fail if any new unaudited secrets found
          if git diff --exit-code .secrets.baseline; then
            echo "Baseline unchanged — no new secrets detected"
          else
            echo "::error::New secrets detected! Run 'detect-secrets scan --baseline .secrets.baseline' locally, audit with 'detect-secrets audit .secrets.baseline', then commit."
            exit 1
          fi
