\* MCrecruiting-safety.cfg
\* Safety check for QGSDRecruiting: PolledCeiling (R1) and SubslotsFirst (R2).
\*
\* Scenario: 2 sub slots, 2 api slots, MaxSize=2.
\* Responsive = {sub1, api2} — one sub responds, one api responds but sub2 does not.
\* TLC explores all possible orderings of slot attempts; invariants must hold in all.
\*
\* Run: java -jar formal/tla/tla2tools.jar -config formal/tla/MCrecruiting-safety.cfg formal/tla/QGSDRecruiting.tla

SPECIFICATION Spec

CONSTANTS
    SubSlots   = {"sub1", "sub2"}
    ApiSlots   = {"api1", "api2"}
    MaxSize    = 2
    Responsive = {"sub1", "api2"}

INVARIANTS
    TypeOK
    PolledCeiling
    SubslotsFirst

\* DONE is an intentional absorbing terminal state — not a deadlock.
CHECK_DEADLOCK FALSE
