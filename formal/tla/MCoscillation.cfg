\* formal/tla/MCoscillation.cfg
\* TLC model for QGSDOscillation.tla — oscillation detection algorithm.
\* Checks safety invariant OscillationFlaggedCorrectly + liveness AlgorithmTerminates.
\*
\* Run: node bin/run-oscillation-tlc.cjs MCoscillation  (requires Java >=17 + tla2tools.jar)
\* Note: -workers 1 required for liveness check (avoids TLC multi-worker liveness bug).
SPECIFICATION Spec
CONSTANTS
    Labels = {A, B, C}
    Depth = 3
    CommitWindow = 5
INVARIANT TypeOK
INVARIANT OscillationFlaggedCorrectly
PROPERTY AlgorithmTerminates
CHECK_DEADLOCK FALSE
