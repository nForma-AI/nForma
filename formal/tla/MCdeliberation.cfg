\* formal/tla/MCdeliberation.cfg
\* TLC model for QGSDDeliberation.tla — R3 deliberation + R3.6 improvement iteration protocol.
\* Checks safety invariants TotalRoundsBounded/DeliberationMonotone/ImprovementMonotone +
\* liveness ProtocolTerminates.
\*
\* Run: node bin/run-protocol-tlc.cjs MCdeliberation  (requires Java >=17 + tla2tools.jar)
\* Note: -workers 1 required for liveness check (avoids TLC multi-worker liveness bug).
SPECIFICATION Spec
CONSTANTS
    MaxDeliberationRounds = 10
    MaxImprovementIterations = 10
INVARIANT TypeOK
INVARIANT TotalRoundsBounded
INVARIANT DeliberationMonotone
INVARIANT ImprovementMonotone
PROPERTY ProtocolTerminates
CHECK_DEADLOCK FALSE
