\* formal/tla/MCTUINavigation.cfg
\* TLC model configuration for TUINavigation.tla
\*
\* State space: 8 states (depth ∈ {0,1,2,3} × exited ∈ {FALSE,TRUE},
\*              minus the impossible exited=TRUE/depth>0 combination)
\*
\* Run: node bin/run-tlc.cjs MCTUINavigation
SPECIFICATION Spec
CONSTANTS
    MaxDepth = 3
\* Safety invariants — verified unconditionally (no fairness needed)
INVARIANT TypeOK
INVARIANT NoDeadlock
INVARIANT DepthBounded
\* Temporal safety — EscapeUp always reduces depth (trivially true by construction)
PROPERTY EscapeProgress
\* EventuallyExits and MainMenuReachable are DEFINITIONS only (see TUINavigation.tla).
\* They require a cooperative user model and cannot be verified without fairness assumptions
\* that constrain how many Select actions the user can take. The meaningful guarantee is:
\*   NoDeadlock + DepthBounded + EscapeProgress → exit is always reachable in ≤MaxDepth ESCs.
CHECK_DEADLOCK FALSE
