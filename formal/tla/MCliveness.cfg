\* formal/tla/MCliveness.cfg
\* TLC liveness model: N=3 agents, NO symmetry (incompatible with liveness), PROPERTY only.
\* Use -workers 1 for liveness (defensive against older TLC multi-worker liveness bugs).
\* Run: node bin/run-tlc.cjs MCliveness  (requires Java >=17 and tla2tools.jar)
\* NOTE: Agents set to 3 model values for tractable liveness checking.
SPECIFICATION Spec
CONSTANTS
    a1 = a1
    a2 = a2
    a3 = a3
    Agents = {a1, a2, a3}
    MaxDeliberation = 4
PROPERTY EventualConsensus
CHECK_DEADLOCK FALSE
