    <text font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace" font-size="14" y="220" xml:space="preserve"><tspan fill="#565f89">  Built on GSD-CC by TÂCHES.</tspan></text>
    <text font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace" font-size="14" y="242" xml:space="preserve"><tspan fill="#565f89">  A quorum of diverse coding agents + formal verification. By Jonathan Borduas.</tspan></text>
    <text font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace" font-size="14" y="286" xml:space="preserve"><tspan fill="#7dcfff">  The task of leadership is to create an alignment of strengths</tspan></text>
    <text font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace" font-size="14" y="308" xml:space="preserve"><tspan fill="#7dcfff">   so strong that it makes the system’s weaknesses irrelevant.</tspan></text>
    <text font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace" font-size="14" y="330" xml:space="preserve"><tspan fill="#565f89">  — Peter Drucker</tspan></text>
    <text font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace" font-size="14" y="374" xml:space="preserve"><tspan fill="#9ece6a">  ✓</tspan><tspan fill="#c0caf5"> 32 commands installed</tspan></text>
    <text font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace" font-size="14" y="396" xml:space="preserve"><tspan fill="#9ece6a">  ✓</tspan><tspan fill="#c0caf5"> Quorum hooks configured</tspan></text>
