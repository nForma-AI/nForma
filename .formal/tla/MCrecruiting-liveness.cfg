\* MCrecruiting-liveness.cfg
\* Liveness check for QGSDRecruiting: FullRecruitment (R3).
\*
\* Scenario: 1 sub slot, 2 api slots, MaxSize=2.
\* Responsive = {sub1, api1} — exactly MaxSize slots respond.
\* EnoughResponsive is true, so FullRecruitment requires <>|recruited|=2.
\* TLC must verify that all fair executions eventually reach recruited = MaxSize.
\*
\* Run: java -jar formal/tla/tla2tools.jar -config formal/tla/MCrecruiting-liveness.cfg formal/tla/QGSDRecruiting.tla

SPECIFICATION Spec

CONSTANTS
    SubSlots   = {"sub1"}
    ApiSlots   = {"api1", "api2"}
    MaxSize    = 2
    Responsive = {"sub1", "api1"}

INVARIANTS
    TypeOK
    PolledCeiling
    SubslotsFirst

PROPERTIES
    FullRecruitment

\* DONE is an intentional absorbing terminal state — not a deadlock.
CHECK_DEADLOCK FALSE
